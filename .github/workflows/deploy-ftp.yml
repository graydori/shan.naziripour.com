name: Deploy to SFTP

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Prepare deploy files
        run: |
          mkdir -p .deploy
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.deploy/' \
            --exclude='img/art/Valentine.mp4' \
            --exclude='img/art/Standup.1.mp4' \
            ./ .deploy/
      - name: Deploy to SFTP
        uses: AbleLincoln/push-to-sftp@v1.0
        with:
          host: ${{ secrets.SFTP_SERVER }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          sourceDir: ".deploy"
          targetDir: "shan.naziripour.com"
