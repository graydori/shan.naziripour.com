name: Deploy to SFTP

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Deploy to SFTP
        uses: AbleLincoln/push-to-sftp@v1.0
        with:
          host: iad1-shared-e1-31.dreamhost.com
          username: graydori
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          sourceDir: "."
          targetDir: "shan.naziripour.com"