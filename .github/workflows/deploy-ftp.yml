name: Deploy to SFTP

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to SFTP
        uses: SamKirkland/web-deploy@v1
        with:
          target-server: ${{ secrets.SFTP_SERVER }}
          remote-user: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          source-path: ./
          destination-path: /home/graydori/shan.naziripour.com/
